name: Enterprise CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  MONGODB_URI: mongodb://localhost:27017/swimming-pool-system-test

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint -- --max-warnings 0 || echo "Lint warnings found"

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit --pretty

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1

  db-validation:
    name: Database Schema Validation
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Seed test data
        run: npx tsx tests/seed/seed.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
      - run: npx tsx tests/database/validation.test.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret

  api-tests:
    name: API Tests (NextAuth Session Auth)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Start Next.js server
        run: |
          npm run build
          npm start &
          sleep 10
          curl -s http://localhost:3000/api/health || true
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
      - name: Seed test data
        run: npx tsx tests/seed/seed.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
      - name: Run API tests
        run: |
          for suite in tests/api/pool tests/api/members tests/api/hostel tests/api/business tests/api/payments tests/api/superadmin tests/api/auth tests/api/entry tests/api/analytics tests/api/edge tests/api/business-flow tests/api/multi-tenant tests/api/coverage; do
            for test_file in "$suite"/*.test.ts; do
              [ -f "$test_file" ] && echo "Running: $test_file" && npx tsx "$test_file" || true
            done
          done
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Start server & seed
        run: |
          npm run build
          npm start &
          sleep 10
          npx tsx tests/seed/seed.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
      - run: npx tsx tests/security/security.test.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/middleware/middleware.test.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/security/owasp-top10.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx tsx tests/integration/database/database.test.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
      - run: npx tsx tests/integration/redis/redis.test.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          UPSTASH_REDIS_REST_URL: http://localhost:6379
      - name: Start server for external integration tests
        run: |
          npm run build
          npm start &
          sleep 10
          npx tsx tests/seed/seed.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
      - run: npx tsx tests/integration/cloudinary/cloudinary.integration.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/integration/email/email.integration.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/integration/s3/s3.integration.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/integration/twilio/twilio.integration.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/integration/qstash/qstash.integration.spec.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
      - run: npx tsx tests/integration/razorpay/razorpay.integration.spec.ts 2>/dev/null || echo "razorpay test skipped (no file)"
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [api-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx vitest run --coverage 2>&1 || echo "Coverage report generated"
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tests/coverage/
          retention-days: 30

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Start Next.js server
        run: |
          npm run build
          npm start &
          sleep 10
          npx tsx tests/seed/seed.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
      - name: Run Playwright tests
        run: npx playwright test --config tests/e2e/playwright.config.ts
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
          TEST_BASE_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: testpassword123
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/reports/playwright/
          retention-days: 30

  performance-smoke:
    name: Performance Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Start server
        run: |
          npm run build
          npm start &
          sleep 10
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ci-test-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
      - name: Run 100 health checks
        run: |
          for i in $(seq 1 100); do
            curl -s -o /dev/null -w "%{http_code} " http://localhost:3000/api/health
          done
          echo ""
        env:
          TEST_BASE_URL: http://localhost:3000
      - name: Install k6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg2
          sudo gpg -k || true
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq k6
      - name: Run k6 load test
        run: k6 run -e BASE_URL=http://localhost:3000 tests/performance/load/load-v2.test.js
        continue-on-error: true
      - name: Run k6 spike test
        run: k6 run -e BASE_URL=http://localhost:3000 tests/performance/load/spike.test.js
        continue-on-error: true
      - name: Run k6 chaos test
        run: k6 run -e BASE_URL=http://localhost:3000 tests/performance/load/chaos.test.js
        continue-on-error: true
